name: Component Model Definition
description: Define the content model for a new or modified UE block
title: "[Model] "
labels: ["component-model"]
body:
  - type: input
    id: block-name
    attributes:
      label: Block Name
      description: The block identifier (lowercase, no spaces). Used for directory and file naming.
      placeholder: e.g. hero, cards, testimonial
    validations:
      required: true

  - type: dropdown
    id: block-type
    attributes:
      label: Block Type
      description: Standalone blocks have a single instance per use. Collection blocks contain repeatable child items (e.g. cards).
      options:
        - Standalone (model-based)
        - Collection (filter-based)
    validations:
      required: true

  - type: textarea
    id: fields
    attributes:
      label: Fields
      description: |
        Define each field using YAML format — one block per field.
        This format maps directly to the component definition JSON.

        **Available types:** text, textarea, richtext, number, boolean, date-time, reference, aem-content, aem-tag, aem-content-fragment, aem-experience-fragment, select, multiselect, checkbox-group, radio-group, container

        For **select/multiselect**, add an `options` list.
      value: |
        ```yaml
        - name: image
          type: reference
          label: Image
          required: true

        - name: imageAlt
          type: text
          label: Alt Text
          required: false

        - name: title
          type: text
          label: Title
          required: true

        - name: description
          type: richtext
          label: Description
          required: false
        ```
    validations:
      required: true

  - type: textarea
    id: child-fields
    attributes:
      label: Child Item Fields (Collection blocks only)
      description: |
        If this is a collection block, define the fields for each repeatable child item using the same YAML format above.
      placeholder: |
        ```yaml
        - name: image
          type: reference
          label: Image
          required: true

        - name: text
          type: richtext
          label: Text
          required: false
        ```

  - type: textarea
    id: variants
    attributes:
      label: Variants / Options
      description: |
        List variants using YAML format. Each variant becomes a CSS class on the block.
        The first entry with an empty `value` is the default.
      placeholder: |
        ```yaml
        - name: Default
          value: ""
        - name: Dark
          value: dark
        - name: Wide
          value: wide
        ```

  - type: textarea
    id: description
    attributes:
      label: Additional Context
      description: Any mockups, screenshots, design references, or notes about expected behavior.
