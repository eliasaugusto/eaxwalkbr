name: Component Model Definition
description: Define the content model for a new or modified UE block
title: "[Model] "
labels: ["component-model"]
body:
  - type: input
    id: block-name
    attributes:
      label: Block Name
      description: The block identifier (lowercase, no spaces). Used for directory and file naming.
      placeholder: e.g. hero, cards, testimonial
    validations:
      required: true

  - type: dropdown
    id: block-type
    attributes:
      label: Block Type
      description: Standalone blocks have a single instance per use. Collection blocks contain repeatable child items (e.g. cards).
      options:
        - Standalone (model-based)
        - Collection (filter-based)
    validations:
      required: true

  - type: textarea
    id: fields
    attributes:
      label: Fields
      description: |
        List each field, one per line, using this format:

        `name, type, label, required`

        **Available types:** text, textarea, richtext, number, boolean, date-time, reference, aem-content, aem-tag, aem-content-fragment, aem-experience-fragment, select, multiselect, checkbox-group, radio-group, container

        For **select/multiselect**, add options after a `>` like: `style, select, Style, no > Option A, Option B`
      value: |
        image, reference, Image, yes
        imageAlt, text, Alt Text, no
        title, text, Title, yes
        description, richtext, Description, no
    validations:
      required: true

  - type: textarea
    id: child-fields
    attributes:
      label: Child Item Fields (Collection blocks only)
      description: |
        If this is a collection block, define the fields for each repeatable child item using the same format above.
      placeholder: |
        image, reference, Image, yes
        text, richtext, Text, no

  - type: textarea
    id: variants
    attributes:
      label: Variants / Options
      description: |
        List variants, one per line: `display name, css-class`
        The first entry with an empty class is the default.
      placeholder: |
        Image Left,
        Image Right, image-right
        Dark, dark

  - type: textarea
    id: description
    attributes:
      label: Additional Context
      description: Any mockups, screenshots, design references, or notes about expected behavior.
